<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Type March XR — JP/EN + Flexible Romaji (Server = sa-ba- only)</title>
    <link rel="stylesheet" href="../css/trackball-typing-practice.css">
</head>

<body class="hasOverlay">
    <div id="game">
        <div class="hud">
            <div class="badge">スコア <b id="score">0</b></div>
            <div class="badge">コンボ <b id="combo">0</b></div>
            <div class="badge">時間 <b id="rt">0:00</b></div>
            <div class="badge">ロック <b id="lockWord">---</b></div>
            <div class="right sound">
                <button class="toggle" id="muteBtn">🔈 ON</button>
                <input type="range" class="vol" id="vol" min="0" max="1" step="0.01" value="0.7" title="Volume">
            </div>
        </div>
        <div class="hpbar">
            <div class="hpfill" id="hpfill"></div>
        </div>

        <div class="lanes" id="lanes"></div>

        <div id="player" aria-hidden="true">
            <svg viewBox="0 0 64 64">
                <path d="M32 6 L38 26 L32 22 L26 26 Z" fill="#9be7ff" />
                <path d="M26 26 L32 58 L38 26 L32 22 Z" fill="#72d6ff" />
                <path d="M14 34 L32 28 L50 34 L32 36 Z" fill="#58b6ff" />
                <ellipse cx="32" cy="24" rx="4" ry="3" fill="#003b6b" />
                <circle id="muzzle" cx="32" cy="6" r="2" fill="#e8ffff" />
            </svg>
        </div>

        <div class="gbar" id="gbar">
            <div class="gwrap" id="gwrap">
                <div class="seg">
                    <div class="fill" id="sg0"></div>
                </div>
                <div class="seg">
                    <div class="fill" id="sg1"></div>
                </div>
                <div class="seg">
                    <div class="fill" id="sg2"></div>
                </div>
                <div class="seg">
                    <div class="fill" id="sg3"></div>
                </div>
                <div class="seg">
                    <div class="fill" id="sg4"></div>
                </div>
            </div>
            <button class="gbtn" id="gbtn" title="満タンのときクリックで発動">OVERDRIVE</button>
        </div>

        <div class="inputDock">
            <input id="type" autocomplete="off" autocapitalize="none" spellcheck="false">
            <button class="focusBtn" id="focusBtn">タイプ開始 / Start Typing</button>
        </div>

        <div class="overlay" id="start">
            <div class="card">
                <h1>Type March XR</h1>
                <p>
                    クリックでロック → ロック中のみタイプで攻撃。ホイール↑でシールド（1.2s）。<br>
                    赤いラインは攻撃不可。横に移動して別レーンへ避けるか、間に合わない時はシールドで受ける。<br>
                    必殺：5段ゲージ。ヒット+0.015段／撃破+0.12段。満タンの段をクリックで発動。<br>
                    ※数値/記号ON時は表示側にも自然に混ざります（例：<b>猫!</b> ⇔ <b>neko!</b>）。
                </p>
                <div class="optrow">
                    <fieldset>
                        <legend>言語モード</legend>
                        <label><input type="radio" name="lang" value="jp" checked> 日本語（表示は漢字/カナ／入力はローマ字）</label>
                        <label><input type="radio" name="lang" value="en"> 英語（かんたん英単語）</label>
                    </fieldset>
                    <fieldset>
                        <legend>難易度</legend>
                        <label><input type="radio" name="difficulty" value="1"> レベル1（ゆっくり・少なめ）</label>
                        <label><input type="radio" name="difficulty" value="2"> レベル2（ふつう）</label>
                        <label><input type="radio" name="difficulty" value="3" checked> レベル3（むずかしい）</label>
                    </fieldset>
                    <fieldset>
                        <legend>文字バリエーション</legend>
                        <label><input type="checkbox" id="optDigits"> 数字あり</label>
                        <label><input type="checkbox" id="optSymbols"> 記号あり</label>
                    </fieldset>
                </div>
                <div class="btns">
                    <button class="btn primary" id="startBtn">スタート</button>
                    <button class="btn" id="homeBtn">Home</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="gameover" style="display:none">
            <div class="card" style="max-width:560px">
                <h1>Game Over</h1>
                <p>スコア <b id="finalScore">0</b> ／ 最高コンボ <b id="finalCombo">0</b></p>
                <p>プレイ時間 <b id="finalTime">0:00</b> ／ ランク <b id="finalRank">D-</b></p>
                <div class="btns">
                    <button class="btn primary" id="retryBtn">もう一度</button>
                    <button class="btn" id="topBtn">トップへ</button>
                </div>
            </div>
        </div>

        <div id="errlog"
            style="display:none;position:fixed;left:8px;bottom:8px;z-index:3000;background:rgba(0,0,0,.6);color:#fff;border:1px solid #914; padding:8px 10px;border-radius:8px;font:12px ui-monospace,monospace;max-width:min(80vw,680px)">
        </div>
    </div>

    <script src="../scripts/trackball-typing-practice.js"></script>
</body>

</html>
